name = "brain"
main = "src/index.ts"
compatibility_date = "2025-03-05"
compatibility_flags = ["nodejs_compat"]

# Cron triggers — data retention runs daily at 3 AM UTC
[triggers]
crons = ["0 3 * * *"]

# Static assets (React SPA)
[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "404-page"

# D1 database binding
# NOTE: These are the author's database IDs. Self-hosters must replace with their own.
# Create your D1 database with: wrangler d1 create brain-db
# Then update the database_id below with the ID from the output.
# See wrangler.toml.template (issue #109) for a clean starting point.
[[d1_databases]]
binding = "DB"
database_name = "brain-db"
database_id = "4dd741c1-dca3-4e5d-a3f5-f4fe9b9ffd0e"
migrations_dir = "../../migrations"

# Workers AI binding (for digest/coaching generation)
[ai]
binding = "AI"

# Vectorize index for semantic search
[[vectorize]]
binding = "VECTORIZE"
index_name = "brain-embeddings"

# Environment variables (secrets set via `wrangler secret put`)
[vars]
JWT_ISSUER = "brain-ai.dev"
FRONTEND_URL = "https://brain-ai.dev"
GITHUB_CALLBACK_URL = "https://brain-ai.dev/auth/github/callback"
GOOGLE_CALLBACK_URL = "https://brain-ai.dev/auth/google/callback"

# Staging environment
[env.staging]
name = "brain-staging"

[env.staging.vars]
JWT_ISSUER = "staging.brain-ai.dev"
FRONTEND_URL = "https://staging.brain-ai.dev"
GITHUB_CALLBACK_URL = "https://staging.brain-ai.dev/auth/github/callback"
GOOGLE_CALLBACK_URL = "https://staging.brain-ai.dev/auth/google/callback"

# Staging needs its own D1 database — create with:
# wrangler d1 create brain-db-staging
# Then update the database_id below with your own staging database ID.
[[env.staging.d1_databases]]
binding = "DB"
database_name = "brain-db-staging"
database_id = "e6a305ce-82ec-43fd-bd92-5ad77c5d7d81"
migrations_dir = "../../migrations"

[env.staging.ai]
binding = "AI"

[[env.staging.vectorize]]
binding = "VECTORIZE"
index_name = "brain-embeddings-staging"

# Production custom domain
routes = [
  { pattern = "brain-ai.dev", custom_domain = true },
  { pattern = "dash.brain-ai.dev/*", zone_name = "brain-ai.dev" },
]

# Staging uses brain-staging.workers.dev (default)
# To add a custom staging domain later:
# [env.staging.routes]
# routes = [{ pattern = "staging.brain-ai.dev", custom_domain = true }]
